workflows:
  android-release:
    name: SecureSMS Guardian - Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - secureguardian_keystore
      groups:
        - supabase_credentials
      vars:
        PACKAGE_NAME: "com.secureguardian.app"
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Set up Supabase environment
        script: |
          # The SUPABASE_URL and SUPABASE_ANON_KEY vars come from the
          # "supabase_credentials" group defined in Codemagic Environment Variables.
          # They are injected into BuildConfig via app/build.gradle.kts automatically.
          echo "SUPABASE_URL: $SUPABASE_URL"
          echo "SUPABASE_ANON_KEY configured: $([ -n "$SUPABASE_ANON_KEY" ] && echo YES || echo NO)"

      - name: Build release APK & AAB
        script: |
          cd $CM_BUILD_DIR
          ./gradlew bundleRelease assembleRelease \
            -PSUPABASE_URL="$SUPABASE_URL" \
            -PSUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  android-debug:
    name: SecureSMS Guardian - Android Debug
    max_build_duration: 30
    environment:
      groups:
        - supabase_credentials
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build debug APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleDebug \
            -PSUPABASE_URL="${SUPABASE_URL:-https://lrnvnbnnxuynaalggdtr.supabase.co}" \
            -PSUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-}"

    artifacts:
      - app/build/outputs/**/*.apk
