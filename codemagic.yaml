workflows:
  android-release:
    name: SecureSMS Guardian - Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - secureguardian_keystore
      groups:
        - supabase_credentials
      vars:
        PACKAGE_NAME: "com.secureguardian.app"
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Set up Supabase environment
        script: |
          echo "SUPABASE_URL: $SUPABASE_URL"
          echo "SUPABASE_ANON_KEY configured: $([ -n "$SUPABASE_ANON_KEY" ] && echo YES || echo NO)"

      - name: Build release APK & AAB
        script: |
          cd $CM_BUILD_DIR
          chmod +x ./gradlew
          # Pass variables as project properties using -P flag
          ./gradlew bundleRelease assembleRelease \
            -PSUPABASE_URL="$SUPABASE_URL" \
            -PSUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt

    # Temporarily disable publishing to fix build
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true

  android-debug:
    name: SecureSMS Guardian - Android Debug
    max_build_duration: 30
    environment:
      groups:
        - supabase_credentials
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build debug APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x ./gradlew
          ./gradlew assembleDebug \
            -PSUPABASE_URL="${SUPABASE_URL}" \
            -PSUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}"

    artifacts:
      - app/build/outputs/**/*.apk
